<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PNP Care Pro</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="auth-screen">
    <div class="auth-card text-center">
      <h1 class="text-2xl font-bold mb-4">PNP Care Pro</h1>
      <form id="login-form">
        <input type="text" id="username" placeholder="ชื่อผู้ใช้"
          class="w-full p-4 border rounded-xl mb-4" required>
        <button class="w-full bg-indigo-600 text-white p-4 rounded-xl">
          เข้าสู่ระบบ
        </button>
      </form>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r p-6">
      <h2 class="font-bold text-indigo-600 mb-6">PNP CARE PRO</h2>
      <button onclick="goPage('dashboard')" class="nav-btn">แดชบอร์ด</button>
      <button onclick="goPage('chat')" class="nav-btn">AI Chat</button>
    </aside>

    <!-- CONTENT -->
    <main class="flex-1 p-8 overflow-auto">

      <!-- DASHBOARD -->
      <section id="dashboard">
        <h2 class="text-xl font-bold mb-6">แดชบอร์ดสุขภาพ</h2>

        <button onclick="simulate()" 
          class="bg-indigo-600 text-white px-4 py-2 rounded-xl mb-6">
          สุ่มค่าจำลอง
        </button>

        <div class="bg-white p-6 rounded-2xl shadow">
          <canvas id="chart"></canvas>
        </div>
      </section>

      <!-- CHAT -->
      <section id="chat" class="hidden">
        <h2 class="text-xl font-bold mb-6">AI Assistant</h2>

        <div id="chat-box" class="chat-box"></div>

        <div class="flex gap-2 mt-4">
          <input id="chat-input" 
            class="flex-1 border rounded-xl p-3" 
            placeholder="พิมพ์ข้อความ...">
          <button onclick="sendChat()" 
            class="bg-indigo-600 text-white px-4 rounded-xl">
            ส่ง
          </button>
        </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
